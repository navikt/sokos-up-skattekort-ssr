apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sokos-up-skattekort-ssr
  namespace: okonomi
  labels:
    team: okonomi
spec:
  image: "{{{ image }}}"
  port: 3000
  liveness:
    path: /api/internal/isAlive
    initialDelay: 10
    timeout: 3
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /api/internal/isReady
    initialDelay: 10
    timeout: 3
    periodSeconds: 10
    failureThreshold: 3
  startup:
    path: /api/internal/isAlive
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 30
  replicas:
    min: 2
    max: 4
    cpuThresholdPercentage: 80
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: "62e34335-63b3-420a-8978-62d48d218c19" # 0000-CA-SOKOS-MF-Skattekort-ssr
        extra:
          - NAVident
  accessPolicy:
    inbound:
      rules:
        - application: sokos-utbetalingsportalen
    outbound:
      rules:
        - application: sokos-skattekort
  webproxy: true
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 500m
      memory: 512Mi
  env:
    - name: SOKOS_SKATTEKORT_API
      value: http://sokos-skattekort
    - name: SOKOS_SKATTEKORT_API_AUDIENCE
      value: "api://dev-gcp.okonomi.sokos-skattekort/.default"
